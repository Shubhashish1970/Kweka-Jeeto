# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build admin (auth disabled for now)
        run: npm ci && cd admin && npm ci && npm run build
        env:
          VITE_ADMIN_AUTH_DISABLED: 'true'
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
      - name: Set Firebase hosting site in firebase.json
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: sed -i.bak "s/FIREBASE_PROJECT_ID/$FIREBASE_PROJECT_ID/g" firebase.json
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KWEKA_JEETO }}
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
