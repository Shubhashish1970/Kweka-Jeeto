name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGION: asia-south1

jobs:
  deploy-backend:
    name: Deploy Backend to GCP Cloud Run
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.url.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - id: project
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker for GCP
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and Push
        run: |
          docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/cloud-run-source-deploy/kweka-jeeto:${{ github.sha }} .
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/cloud-run-source-deploy/kweka-jeeto:${{ github.sha }}

      - name: Deploy to Cloud Run
        id: deploy
        env:
          WHATSAPP_ACCESS_TOKEN: ${{ secrets.WHATSAPP_ACCESS_TOKEN }}
          WHATSAPP_PHONE_NUMBER_ID: ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
          WHATSAPP_VERIFY_TOKEN: ${{ secrets.WHATSAPP_VERIFY_TOKEN }}
          WABA_ID: ${{ secrets.WABA_ID }}
          FLOW_ID: ${{ secrets.FLOW_ID }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          ADMIN_JWT_SECRET: ${{ secrets.ADMIN_JWT_SECRET }}
        run: |
          gcloud run deploy kweka-jeeto \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/cloud-run-source-deploy/kweka-jeeto:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "NODE_ENV=production,ADMIN_AUTH_DISABLED=true,WHATSAPP_ACCESS_TOKEN=$WHATSAPP_ACCESS_TOKEN,WHATSAPP_PHONE_NUMBER_ID=$WHATSAPP_PHONE_NUMBER_ID,WHATSAPP_VERIFY_TOKEN=$WHATSAPP_VERIFY_TOKEN,WABA_ID=$WABA_ID,FLOW_ID=$FLOW_ID,MONGODB_URI=$MONGODB_URI,ADMIN_PASSWORD=$ADMIN_PASSWORD,ADMIN_JWT_SECRET=$ADMIN_JWT_SECRET"

      - name: Get Cloud Run URL
        id: url
        run: |
          URL=$(gcloud run services describe kweka-jeeto --region ${{ env.REGION }} --project ${{ secrets.GCP_PROJECT_ID }} --format='value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Backend URL: $URL"

  deploy-admin:
    name: Deploy Admin to Firebase
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install backend deps
        run: npm ci

      - name: Install admin deps
        run: cd admin && npm ci

      - name: Build admin
        run: npm run build:admin
        env:
          VITE_API_URL: ${{ needs.deploy-backend.outputs.url }}
          VITE_ADMIN_AUTH_DISABLED: 'true'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set Firebase hosting site and deploy
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          sed -i.bak "s/FIREBASE_PROJECT_ID/$FIREBASE_PROJECT_ID/g" firebase.json
          firebase deploy --only hosting --project "$FIREBASE_PROJECT_ID"
