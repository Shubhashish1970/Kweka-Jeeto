name: Check Flows (Debug)

on:
  workflow_dispatch:

jobs:
  check-flows:
    name: List All WhatsApp Flows
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: List flows
        env:
          WHATSAPP_ACCESS_TOKEN: ${{ secrets.WHATSAPP_ACCESS_TOKEN }}
          WABA_ID: ${{ secrets.WABA_ID }}
        run: npx ts-node scripts/check-flows.ts
