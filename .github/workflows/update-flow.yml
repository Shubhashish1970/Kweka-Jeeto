name: Update Flow JSON (O)
# Run this whenever flows/farmer-registration.json changes.
# Updates the existing published flow in-place (deprecate → upload → publish).
# Does NOT create a new flow or change the FLOW_ID.

on:
  workflow_dispatch:

jobs:
  update-flow:
    name: Update WhatsApp Flow JSON
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Check required secrets
        run: |
          if [ -z "${{ secrets.FLOW_ID }}" ]; then
            echo "::error::FLOW_ID secret is not set. Run 'Deploy Flow (O)' first to create the flow."
            exit 1
          fi
          if [ -z "${{ secrets.WHATSAPP_ACCESS_TOKEN }}" ]; then
            echo "::error::WHATSAPP_ACCESS_TOKEN secret is not set."
            exit 1
          fi
          echo "Required secrets are set."

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Update Flow JSON on Meta
        env:
          FLOW_ID: ${{ secrets.FLOW_ID }}
          WHATSAPP_ACCESS_TOKEN: ${{ secrets.WHATSAPP_ACCESS_TOKEN }}
        run: npm run update:flow
