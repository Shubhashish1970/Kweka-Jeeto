name: Update Flow JSON (O)
# Run this whenever flows/farmer-registration.json changes.
# Creates a new published flow and prints the new FLOW_ID.
# After this runs: update whatsapp_flow_id in Admin Portal → Config (no redeploy needed).

on:
  workflow_dispatch:

jobs:
  update-flow:
    name: Update WhatsApp Flow JSON
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Check required secrets
        run: |
          if [ -z "${{ secrets.WHATSAPP_ACCESS_TOKEN }}" ]; then
            echo "::error::WHATSAPP_ACCESS_TOKEN secret is not set."
            exit 1
          fi
          if [ -z "${{ secrets.WABA_ID }}" ] && [ -z "${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}" ]; then
            echo "::error::Set WABA_ID or WHATSAPP_PHONE_NUMBER_ID in GitHub Secrets."
            exit 1
          fi
          echo "Required secrets are set."

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Create and publish new flow
        env:
          WHATSAPP_ACCESS_TOKEN: ${{ secrets.WHATSAPP_ACCESS_TOKEN }}
          WABA_ID: ${{ secrets.WABA_ID }}
          WHATSAPP_PHONE_NUMBER_ID: ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
          FLOW_ENDPOINT_URI: ${{ secrets.VITE_API_URL }}/flow/endpoint
        run: npm run update:flow

      - name: Show next step
        if: success()
        run: |
          NEW_FLOW_ID=$(cat .flow_id 2>/dev/null || echo "check logs above")
          echo ""
          echo "=========================================="
          echo "ACTION REQUIRED:"
          echo "  Admin Portal → Config → whatsapp_flow_id"
          echo "  Set value to: $NEW_FLOW_ID"
          echo "  No backend redeploy needed."
          echo "=========================================="
