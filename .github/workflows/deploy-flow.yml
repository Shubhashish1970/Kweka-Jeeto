# Run this workflow ONCE to create and publish the WhatsApp Flow.
# Add the printed FLOW_ID to GitHub Secrets, then the main deploy workflow will use it.
name: Deploy Flow (One-Time)

on:
  workflow_dispatch:

jobs:
  deploy-flow:
    name: Create and Publish WhatsApp Flow
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Check required secrets
        run: |
          if [ -z "${{ secrets.WHATSAPP_ACCESS_TOKEN }}" ]; then
            echo "::error::GitHub secret WHATSAPP_ACCESS_TOKEN is not set. Add it in Settings → Secrets and variables → Actions."
            exit 1
          fi
          if [ -z "${{ secrets.WABA_ID }}" ] && [ -z "${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}" ]; then
            echo "::error::Set at least one: WABA_ID (WhatsApp Business Account ID) or WHATSAPP_PHONE_NUMBER_ID. WABA can be auto-resolved from token when Phone Number ID is set."
            exit 1
          fi
          echo "Required secrets are set."

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Deploy Flow to Meta
        id: flow
        env:
          WHATSAPP_ACCESS_TOKEN: ${{ secrets.WHATSAPP_ACCESS_TOKEN }}
          WABA_ID: ${{ secrets.WABA_ID }}
          WHATSAPP_PHONE_NUMBER_ID: ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
        run: npm run deploy:flow

      - name: Set FLOW_ID output
        if: success()
        run: |
          FLOW_ID=$(cat .flow_id)
          echo "flow_id=$FLOW_ID" >> $GITHUB_OUTPUT
          echo ""
          echo "=========================================="
          echo "Add this to GitHub Secrets:"
          echo "  FLOW_ID = $FLOW_ID"
          echo "=========================================="
