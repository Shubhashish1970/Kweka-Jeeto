      /* Reference zoom: match 90% Chrome look at 100% browser zoom (UI_STANDARDS) */

      @supports not (zoom: 1) {
        html { transform: scale(0.9); transform-origin: top left; width: 111.111vw; min-height: 111.111vh; overflow-x: hidden; }
      }
    </style>
